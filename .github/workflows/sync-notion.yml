name: Sync Notion Docs to GitHub

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:          # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @notionhq/client notion-to-md

      - name: Run Notion sync script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_ROOT_PAGE_ID: ${{ secrets.NOTION_ROOT_PAGE_ID }}
        run: node scripts/sync-notion.mjs

      - name: Commit synced content
        run: |
          git config user.name "notion-sync[bot]"
          git config user.email "bot@tenantsage.ai"
          git add content/
          git diff --staged --quiet || git commit -m "chore: sync Notion docs $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
